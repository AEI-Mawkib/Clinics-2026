<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor · Mawkib Clinic</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="role-doctor">
<header class="bar">
  <img class="logo" src="/logo.png" alt="AEI Telehealth" onerror="this.style.display='none'">
  <div><h1>Doctor</h1><div class="sub" id="siteBanner"></div></div>
  <a class="home" href="/">Menu</a>
</header>
<main>
  <div class="card staff-card" style="padding:12px 18px">
    <label for="doctorSel" style="margin-top:0">👨‍⚕️ Doctor on this shift</label>
    <select id="doctorSel"><option value="">— select doctor —</option></select>
    <p class="warn" id="doctorWarn">Select the doctor to unlock the form below.</p>
    <p class="note" style="margin-bottom:0">Names are managed on the Admin page. Your choice is remembered on this tablet.</p>
  </div>

  <div id="listView">
    <h2>Waiting for consultation</h2>
    <div id="waiting"></div>
    <h2>Already prescribed today</h2>
    <div id="done"></div>
  </div>

  <div id="detailView" style="display:none">
    <button class="btn secondary small" id="back">&larr; Back to queue</button>
    <div class="card" id="pInfo" style="margin-top:12px"></div>

    <div class="card">
      <label style="margin-top:0">Vital signs</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><input id="bp" type="text" placeholder="Blood pressure (e.g. 120/80)"></div>
        <div><input id="temperature" type="text" inputmode="decimal" placeholder="Temperature (°C / °F)"></div>
        <div><input id="height" type="text" inputmode="decimal" placeholder="Height (cm)"></div>
        <div><input id="weight" type="text" inputmode="decimal" placeholder="Weight (kg)"></div>
      </div>

      <label for="notes">Doctor notes</label>
      <textarea id="notes" placeholder="Diagnosis, advice, follow-up..."></textarea>

      <label>Medicines — tick, set quantity per dose and how often</label>
      <div id="meds"></div>

      <div style="margin-top:18px">
        <button class="btn" id="savePrescription">Save &amp; send to Pharmacy</button>
      </div>
    </div>
  </div>
</main>

<script src="/app.js"></script>
<script>
let currentId = null;

async function loadDoctors() {
  const list = await api('/api/list/doctor');
  const sel = document.getElementById('doctorSel');
  const saved = localStorage.getItem('doctorName') || '';
  sel.innerHTML = '<option value="">— select doctor —</option>' +
    list.map(d => `<option ${d.name === saved ? 'selected' : ''}>${esc(d.name)}</option>`).join('');
  sel.onchange = () => { localStorage.setItem('doctorName', sel.value); gate(); };
  gate();
}

/* lock everything until a doctor is chosen */
function gate() {
  const on = !!document.getElementById('doctorSel').value;
  document.getElementById('listView').classList.toggle('gate-off', !on);
  document.getElementById('detailView').classList.toggle('gate-off', !on);
  document.getElementById('doctorWarn').style.display = on ? 'none' : 'block';
}

async function refresh() {
  showSite('siteBanner');
  const list = await api('/api/patients?status=all');
  const waiting = list.filter(p => p.status === 'waiting');
  const rest = list.filter(p => p.status !== 'waiting');
  document.getElementById('waiting').innerHTML = waiting.length
    ? waiting.map(p => patientRow(p)).join('')
    : '<div class="empty">No one is waiting right now.</div>';
  document.getElementById('done').innerHTML = rest.length
    ? rest.slice().reverse().map(p => patientRow(p)).join('')
    : '<div class="empty">Nothing prescribed yet today.</div>';
  document.querySelectorAll('.row').forEach(r => r.onclick = () => openPatient(Number(r.dataset.id)));
}

async function openPatient(id) {
  if (!document.getElementById('doctorSel').value) return toast('Select the doctor on shift first', 'err');
  currentId = id;
  window._pausePoll = true;
  const [p, meds] = await Promise.all([api('/api/patients/' + id), api('/api/medicines')]);

  document.getElementById('pInfo').innerHTML = `
    <div style="display:flex;gap:14px;align-items:center">
      <div class="token">${p.token}</div>
      <div>
        <div style="font-size:22px;font-weight:900">${esc(p.name)}</div>
        <div class="note">${[p.age ? p.age + ' yrs' : '', p.gender || '', p.nationality || ''].filter(Boolean).join(' · ')}</div>
      </div>
    </div>
    <p><b>Complaint:</b> ${esc(p.complaint || '—')}</p>
    ${p.allergies ? `<p style="color:var(--danger)"><b>⚠ Allergies:</b> ${esc(p.allergies)}</p>` : ''}`;

  document.getElementById('bp').value = p.bp || '';
  document.getElementById('temperature').value = p.temperature || '';
  document.getElementById('height').value = p.height || '';
  document.getElementById('weight').value = p.weight || '';
  document.getElementById('notes').value = p.notes || '';

  const FREQS = ['once a day', 'twice a day', 'thrice a day', 'hourly'];
  const chosen = {};
  (p.items || []).forEach(it => chosen[it.medicine_id] = { dose_qty: it.dose_qty || 1, frequency: it.frequency || 'once a day' });
  document.getElementById('meds').innerHTML = meds.map(m => {
    const c = chosen[m.id];
    return `
    <div class="med ${stockClass(m.stock, m.full_stock)} ${c ? 'checked' : ''}" data-id="${m.id}">
      <input type="checkbox" ${c ? 'checked' : ''}>
      <div class="medname">${esc(m.name)}
        <div class="note" style="font-weight:400">available: ${m.stock}</div>
      </div>
      <input class="dose doseQty" type="number" inputmode="numeric" min="1" value="${c ? c.dose_qty : 1}"
             title="Quantity per dose" style="width:80px">
      <select class="dose freqSel" title="How often" style="width:150px">
        ${FREQS.map(f => `<option ${c && c.frequency === f ? 'selected' : ''}>${f}</option>`).join('')}
      </select>
    </div>`;
  }).join('');
  document.querySelectorAll('.med input[type=checkbox]').forEach(cb => {
    cb.onchange = () => cb.closest('.med').classList.toggle('checked', cb.checked);
  });

  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  window.scrollTo(0, 0);
}

document.getElementById('back').onclick = () => {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  window._pausePoll = false;
  refresh();
};

document.getElementById('savePrescription').onclick = async () => {
  const doctor = document.getElementById('doctorSel').value;
  if (!doctor) return toast('Select the doctor on shift (top of page)', 'err');
  const items = [...document.querySelectorAll('.med')]
    .filter(m => m.querySelector('input[type=checkbox]').checked)
    .map(m => ({
      medicine_id: Number(m.dataset.id),
      dose_qty: Number(m.querySelector('.doseQty').value) || 1,
      frequency: m.querySelector('.freqSel').value,
    }));
  try {
    await api('/api/patients/' + currentId + '/prescription', { method: 'POST', body: {
      notes: document.getElementById('notes').value.trim(),
      bp: document.getElementById('bp').value.trim(),
      temperature: document.getElementById('temperature').value.trim(),
      height: document.getElementById('height').value.trim(),
      weight: document.getElementById('weight').value.trim(),
      doctor_name: doctor,
      items,
    }});
    toast('Sent to Pharmacy', 'ok');
    document.getElementById('back').click();
  } catch (e) { toast(e.message, 'err'); }
};

loadDoctors();
poll(refresh);
</script>
</body>
</html>
